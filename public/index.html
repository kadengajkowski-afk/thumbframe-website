<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- SEO -->
    <title>ThumbFrame — AI-Powered YouTube Thumbnail Editor</title>
    <meta name="description" content="Create click-worthy YouTube thumbnails with AI-powered analysis, one-click enhancements, safe zone overlay, and multi-device preview. Free to use." />
    <meta name="keywords" content="YouTube thumbnail maker, thumbnail editor, AI thumbnail analysis, YouTube CTR, thumbnail creator, YouTube thumbnail generator, thumbnail design tool" />
    <meta name="author" content="ThumbFrame" />
    <link rel="canonical" href="https://www.thumbframe.com/" />

    <!-- Open Graph (Facebook, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.thumbframe.com" />
    <meta property="og:title" content="ThumbFrame — Thumbnails that ship" />
    <meta property="og:description" content="The YouTube thumbnail editor built for creators who ship. AI-powered, CTR-optimized, beautifully designed." />
    <meta property="og:image" content="https://www.thumbframe.com/og-image.png" />
    <meta property="og:site_name" content="ThumbFrame" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ThumbFrame — Thumbnails that ship" />
    <meta name="twitter:description" content="The YouTube thumbnail editor built for creators who ship." />
    <meta name="twitter:image" content="https://www.thumbframe.com/og-image.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large" />

    <!-- PWA / Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#ff6a00" />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T7ZLMB1Q65"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T7ZLMB1Q65');
    </script>

    <!-- DNS prefetch for API -->
    <link rel="dns-prefetch" href="https://thumbframe-api-production.up.railway.app">

    <!-- Landing hero poster — preloaded so it paints before the video buffers.
         The video itself uses preload="auto" on the <video> tag — Chrome warns
         about `as="video"` on <link rel=preload>, so we skip that hint. -->
    <link rel="preload" as="image" href="/assets/thumbtown/panorama-poster.jpg" fetchpriority="high">

    <!-- Satoshi (UI font) -->
    <link rel="preconnect" href="https://api.fontshare.com">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,800,700,500,400,300&display=swap" rel="stylesheet">

    <!-- Editor fonts (loaded on-demand) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bebas+Neue&family=Montserrat:wght@400;700;900&family=Oswald:wght@400;700&family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ThumbFrame",
      "url": "https://www.thumbframe.com",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Web",
      "description": "YouTube thumbnail editor with A/B testing, brand kits, AI background removal, and CTR analytics.",
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "name": "Starter",
          "description": "Free basic canvas with standard exports"
        },
        {
          "@type": "Offer",
          "price": "15",
          "priceCurrency": "USD",
          "name": "Pro Creator",
          "description": "A/B Variant Engine, Full Brand Kit, unlimited exports, no watermarks"
        }
      ]
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
