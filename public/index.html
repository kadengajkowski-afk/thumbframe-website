<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23c45c2e'/><text y='75' x='50' text-anchor='middle' font-size='65' font-family='Arial Black' font-weight='900' fill='white'>S</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>ThumbFrame — Viral Thumbnail Editor</title>
    <style>
  :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
  html, body { margin: 0; padding: 0; background: #000; }

  /* Editor main layout */
  .editor-main-layout {
    display: flex !important;
    height: calc(100vh - 50px);
    width: 100vw;
    overflow: hidden;
    background: #0f0f0f;
  }

  /* Desktop sidebars */
  .sidebar-left, .sidebar-right {
    display: flex !important;
    flex-direction: column;
    background: #161616;
    border: 1px solid #2a2a2a;
    z-index: 10;
    height: 100%;
  }

  /* Landing page */
  @media (max-width: 768px) {
    .desktop-nav-links, .desktop-only { display: none !important; }
    nav { height: 60px !important; padding: var(--safe-top) 15px 0 !important; }
    .hero-grid { grid-template-columns: 1fr !important; padding: 20px !important; text-align: center; }
    h1 { font-size: 32px !important; line-height: 1.1 !important; }
    .hero-text-container button { width: 100% !important; margin-bottom: 10px; }

    /* Mobile bottom dock */
    .mobile-bottom-dock {
      display: flex !important;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #161616;
      z-index: 9999;
      flex-direction: column;
    }

    /* Canvas viewport */
    .canvas-viewport {
      flex: 1;
      width: 100vw;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      overflow: hidden;
    }

    /* YouTube canvas */
    .youtube-canvas {
      width: 100% !important;
      aspect-ratio: 16 / 9;
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Tool ribbon */
    .tool-ribbon { display: flex; overflow-x: auto; padding: 12px; gap: 12px; scrollbar-width: none; }
    .tool-ribbon::-webkit-scrollbar { display: none; }
    .tool-pill { flex: 0 0 auto; background: #262626; border: 1px solid #333; color: #fff; padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 600; }
    .tool-pill.active { background: #fff; color: #000; border-color: #fff; }

    /* Face analysis */
    .face-marker { position: absolute; border: 2px solid #00ff00; background: rgba(0,255,0,0.1); border-radius: 4px; pointer-events: none; z-index: 10000; }
    .face-score-badge { background: #00ff00; color: #000; font-weight: bold; font-size: 10px; padding: 2px 4px; border-radius: 2px; margin-top: -18px; }
  }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

  </body>
</html>
