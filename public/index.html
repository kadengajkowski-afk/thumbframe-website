  :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }

  /* Prevent ANY scrolling on the whole site for mobile */

    background: #000;
    position: fixed; /* Hard-lock the background */

  .mobile-canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    touch-action: none;
