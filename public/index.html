<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- SEO -->
    <title>ThumbFrame — YouTube Thumbnail Editor with Background Remover & CTR Tools</title>
    <meta name="description" content="Professional YouTube thumbnail editor with brush tools, background remover, CTR analyzer, templates, and image generation. Everything you need to ship thumbnails that get clicks." />
    <meta name="keywords" content="YouTube thumbnail editor, thumbnail maker, background remover, CTR analyzer, thumbnail design tool, AI thumbnail generator, image generator, thumbnail templates, online thumbnail editor, free thumbnail tool, Photoshop alternative, Canva alternative, YouTube creator tools" />
    <meta name="author" content="ThumbFrame" />
    <link rel="canonical" href="https://www.thumbframe.com" />

    <!-- Open Graph (Facebook, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.thumbframe.com" />
    <meta property="og:title" content="ThumbFrame — YouTube Thumbnail Editor with Background Remover & CTR Tools" />
    <meta property="og:description" content="Professional YouTube thumbnail editor. Background remover, CTR analyzer, image generation, templates, and all the editing tools creators need." />
    <meta property="og:image" content="https://www.thumbframe.com/og-image.png" />
    <meta property="og:site_name" content="ThumbFrame" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ThumbFrame — YouTube Thumbnail Editor" />
    <meta name="twitter:description" content="Professional YouTube thumbnail editor. Background remover, CTR analyzer, image generation, and templates for creators." />
    <meta name="twitter:image" content="https://www.thumbframe.com/og-image.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large" />

    <!-- PWA / Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#ff6a00" />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T7ZLMB1Q65"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T7ZLMB1Q65');
    </script>

    <!-- DNS prefetch for API -->
    <link rel="dns-prefetch" href="https://thumbframe-api-production.up.railway.app">

    <!-- Landing hero poster — preloaded so it paints before the video buffers.
         The video itself uses preload="auto" on the <video> tag — Chrome warns
         about `as="video"` on <link rel=preload>, so we skip that hint. -->
    <link rel="preload" as="image" href="/assets/thumbtown/panorama-poster.jpg" fetchpriority="high">

    <!-- Satoshi (UI font) -->
    <link rel="preconnect" href="https://api.fontshare.com">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,800,700,500,400,300&display=swap" rel="stylesheet">

    <!-- Editor fonts (loaded on-demand) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bebas+Neue&family=Montserrat:wght@400;700;900&family=Oswald:wght@400;700&family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">

    <!-- Structured Data — SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ThumbFrame",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Web",
      "description": "Professional YouTube thumbnail editor with background remover, CTR analyzer, image generation, templates, and editing tools. Built for creators who ship.",
      "url": "https://www.thumbframe.com",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Full editor with 5 ThumbFriend messages/day and 5 background removals/month"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "15",
          "priceCurrency": "USD",
          "priceValidUntil": "2027-12-31",
          "description": "Unlimited smart features, unlimited background removals, premium templates, CTR analyzer, and more"
        }
      ],
      "featureList": [
        "YouTube thumbnail editor",
        "Background remover",
        "Image generator",
        "Auto thumbnail generation",
        "CTR score analyzer",
        "A/B variants",
        "Face enhancement",
        "Style transfer",
        "Brush and paint tools",
        "Magic wand and lasso selection",
        "Text editor with custom fonts",
        "Thumbnail templates",
        "Auto-save cloud storage",
        "YouTube channel integration"
      ],
      "screenshot": "https://www.thumbframe.com/og-image.png",
      "creator": {
        "@type": "Organization",
        "name": "ThumbFrame",
        "url": "https://www.thumbframe.com"
      }
    }
    </script>

    <!-- Structured Data — FAQPage (for AI answer engines + Google FAQ rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is ThumbFrame?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ThumbFrame is a professional YouTube thumbnail editor designed for creators. It includes a full image editor with brush tools, background remover, image generation, CTR analyzer, templates, and an AI creative partner — all built to help creators make thumbnails that get clicks."
          }
        },
        {
          "@type": "Question",
          "name": "Is ThumbFrame free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ThumbFrame has a free plan that includes the full editor with watermark-free exports, 5 background removals per month, and 5 ThumbFriend AI messages per day. Pro is $15/month and unlocks unlimited AI features, unlimited background removals, premium templates, and advanced CTR analysis."
          }
        },
        {
          "@type": "Question",
          "name": "How is ThumbFrame different from Canva or Photoshop?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ThumbFrame is built specifically for YouTube thumbnails. Unlike general-purpose tools like Canva or Photoshop, it optimizes for the 1280x720 thumbnail canvas, includes YouTube-specific features like CTR scoring and feed simulation, and streamlines the workflow so you can go from idea to published thumbnail in minutes."
          }
        },
        {
          "@type": "Question",
          "name": "Does ThumbFrame have AI features?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ThumbFrame includes image generation, auto thumbnail creation from descriptions, background removal, face enhancement, style transfer, and ThumbFriend — an AI creative partner that helps brainstorm and refine thumbnails. Most AI features are available on the Pro plan, with a free tier for background removal and ThumbFriend messaging."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use ThumbFrame thumbnails commercially?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Thumbnails you create with ThumbFrame belong to you. You can use them on YouTube, social media, paid promotions, or client work. ThumbFrame doesn't claim any rights to your output."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
