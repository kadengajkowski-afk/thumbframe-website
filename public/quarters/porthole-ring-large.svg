           a 153.6 153.6 0 1 0 0.001 0 Z
           M 160 28.80000000000001
           a 131.2 131.2 0 1 1 -0.001 0 Z"
        fill="url(#brass-320)"
        fill-rule="evenodd" />

  <!-- Inner-edge bevel shadow -->
  <circle cx="160" cy="160" r="153.6" fill="url(#brass-bevel-320)" />

  <!-- Top highlight (suggests overhead light) -->
  <ellipse cx="160" cy="67.84"
           rx="69.12" ry="8.96"
           fill="rgba(255, 240, 200, 0.45)" />

