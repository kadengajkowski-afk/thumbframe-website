           M 70 12.599999999999994
           a 57.400000000000006 57.400000000000006 0 1 1 -0.001 0 Z"
        fill="url(#brass-140)"
        fill-rule="evenodd" />

  <!-- Inner-edge bevel shadow -->
  <circle cx="70" cy="70" r="67.2" fill="url(#brass-bevel-140)" />

  <!-- Top highlight (suggests overhead light) -->
