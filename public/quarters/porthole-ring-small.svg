  <!-- Outer glow -->
  <circle cx="70" cy="70" r="68.60000000000001" fill="rgba(184, 134, 75, 0.22)" filter="url(#outer-glow-140)" />

  <!-- Brass ring (annulus via two circles + even-odd fill workaround) -->
