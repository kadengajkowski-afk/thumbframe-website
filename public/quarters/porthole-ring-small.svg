<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <linearGradient id="brass-140" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A55C" />
      <stop offset="50%" stop-color="#B8864B" />
      <stop offset="100%" stop-color="#7a5430" />
    </linearGradient>
    <radialGradient id="brass-bevel-140" cx="50%" cy="50%" r="50%">
      <stop offset="85.4%" stop-color="rgba(0,0,0,0.0)" />
      <stop offset="91.3%" stop-color="rgba(0,0,0,0.45)" />
      <stop offset="92.7%" stop-color="rgba(0,0,0,0)" />
