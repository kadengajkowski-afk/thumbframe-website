<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <linearGradient id="brass-220" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A55C" />
      <stop offset="50%" stop-color="#B8864B" />
      <stop offset="100%" stop-color="#7a5430" />
    </linearGradient>
    <radialGradient id="brass-bevel-220" cx="50%" cy="50%" r="50%">
      <stop offset="85.4%" stop-color="rgba(0,0,0,0.0)" />
      <stop offset="91.2%" stop-color="rgba(0,0,0,0.45)" />
      <stop offset="92.7%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
    <filter id="outer-glow-220" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.6" />
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="110" cy="110" r="107.8" fill="rgba(184, 134, 75, 0.22)" filter="url(#outer-glow-220)" />

  <!-- Brass ring (annulus via two circles + even-odd fill workaround) -->
  <path d="M 110 4.400000000000006
           a 105.6 105.6 0 1 0 0.001 0 Z
           M 110 19.80000000000001
           a 90.19999999999999 90.19999999999999 0 1 1 -0.001 0 Z"
        fill="url(#brass-220)"
        fill-rule="evenodd" />

  <!-- Inner-edge bevel shadow -->
  <circle cx="110" cy="110" r="105.6" fill="url(#brass-bevel-220)" />

  <!-- Top highlight (suggests overhead light) -->
  <ellipse cx="110" cy="46.64"
           rx="47.52" ry="6.16"
           fill="rgba(255, 240, 200, 0.45)" />

  <!-- Rivets -->
  <g>
    <circle cx="110.00" cy="12.10" r="3.96" fill="#3a2818" opacity="0.75" />
    <circle cx="110.00" cy="12.10" r="2.18" fill="#D4A55C" opacity="0.95" />
    <circle cx="194.78" cy="61.05" r="3.96" fill="#3a2818" opacity="0.75" />
    <circle cx="194.78" cy="61.05" r="2.18" fill="#D4A55C" opacity="0.95" />
    <circle cx="194.78" cy="158.95" r="3.96" fill="#3a2818" opacity="0.75" />
    <circle cx="194.78" cy="158.95" r="2.18" fill="#D4A55C" opacity="0.95" />
    <circle cx="110.00" cy="207.90" r="3.96" fill="#3a2818" opacity="0.75" />
    <circle cx="110.00" cy="207.90" r="2.18" fill="#D4A55C" opacity="0.95" />
    <circle cx="25.22" cy="158.95" r="3.96" fill="#3a2818" opacity="0.75" />
    <circle cx="25.22" cy="158.95" r="2.18" fill="#D4A55C" opacity="0.95" />
    <circle cx="25.22" cy="61.05" r="3.96" fill="#3a2818" opacity="0.75" />
    <circle cx="25.22" cy="61.05" r="2.18" fill="#D4A55C" opacity="0.95" />
  </g>
</svg>