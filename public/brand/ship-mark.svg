<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  width="512" height="512"
  role="img"
  aria-labelledby="tf-ship-title tf-ship-desc">
  <title id="tf-ship-title">ThumbFrame solar sailship</title>
  <desc id="tf-ship-desc">A painterly side view of the ThumbFrame solar sailship — wooden hull with stern cabin, tall mast flying a single golden sail painted with the ThumbFrame T, two amber lanterns.</desc>

  <defs>
    <!-- Sail: deep amber bronze at top, bright gold at belly, warm cream at the trailing edge -->
    <linearGradient id="tf-sail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7a4f22" />
      <stop offset="38%"  stop-color="#d69a4a" />
      <stop offset="72%"  stop-color="#faca8c" />
      <stop offset="100%" stop-color="#e8b878" />
    </linearGradient>

    <!-- Sheen band across the belly of the sail -->
    <linearGradient id="tf-sail-sheen" x1="0" y1="0.25" x2="1" y2="0.55">
      <stop offset="0%"  stop-color="rgba(255,240,200,0)" />
      <stop offset="48%" stop-color="rgba(255,240,200,0.55)" />
      <stop offset="100%" stop-color="rgba(255,240,200,0)" />
    </linearGradient>

    <!-- Hull: warm wood, darker at the waterline -->
    <linearGradient id="tf-hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c89968" />
      <stop offset="55%" stop-color="#b8855a" />
      <stop offset="100%" stop-color="#5c3820" />
    </linearGradient>

    <!-- Stern cabin body -->
    <linearGradient id="tf-cabin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#a67448" />
      <stop offset="100%" stop-color="#7a5030" />
    </linearGradient>

    <!-- Lantern / engine-ring glow halo -->
    <radialGradient id="tf-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffe8c0" stop-opacity="1" />
      <stop offset="35%" stop-color="#ffb060" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#ffb060" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- === back-to-front === -->

  <!-- Lantern halos sitting behind the ship so the glow bleeds past the hull -->
  <circle cx="355" cy="392" r="26" fill="url(#tf-glow)" />
  <circle cx="223" cy="392" r="26" fill="url(#tf-glow)" />

  <!-- Engine nozzle at stern (behind hull silhouette) -->
  <rect x="82" y="420" width="36" height="24" rx="4" fill="#2a2030" />
  <!-- Emissive ring -->
  <circle cx="82" cy="432" r="18" fill="url(#tf-glow)" />
  <circle cx="82" cy="432" r="9"  fill="#ffb060" />

  <!-- Mast (full length; sail covers the middle portion) -->
  <rect x="229" y="78" width="9" height="366" rx="2" fill="#4a3020" />

  <!-- Yard (top spar the sail hangs from) -->
  <rect x="72" y="84" width="336" height="8" rx="3" fill="#4a3020" />
  <!-- Yard end caps -->
  <circle cx="72"  cy="88" r="7" fill="#4a3020" />
  <circle cx="408" cy="88" r="7" fill="#4a3020" />

  <!-- Sail — trapezoid with a gentle leeward billow (wind from left) -->
  <path
    d="M 78 92
       C 160 86, 320 80, 402 94
       C 432 180, 432 220, 402 302
       C 320 316, 160 314, 78 300
       C 52 220, 52 180, 78 92 Z"
    fill="url(#tf-sail)" />

  <!-- Sail sheen: a diagonal highlight band caught by starlight -->
  <path
    d="M 78 92
       C 160 86, 320 80, 402 94
       C 432 180, 432 220, 402 302
       C 320 316, 160 314, 78 300
       C 52 220, 52 180, 78 92 Z"
    fill="url(#tf-sail-sheen)" opacity="0.65" />

  <!-- Painted T on the sail (ThumbFrame brand mark) -->
  <g fill="#ed7a2e" opacity="0.92">
    <!-- horizontal bar -->
    <rect x="118" y="132" width="260" height="38" rx="7" />
    <!-- vertical bar -->
    <rect x="228" y="132" width="40" height="158" rx="7" />
  </g>
  <!-- Soft rim light on the T (bottom edge catching gold) -->
  <g fill="#ffc268" opacity="0.35">
    <rect x="118" y="160" width="260" height="10" rx="5" />
    <rect x="228" y="280" width="40" height="10" rx="5" />
  </g>

  <!-- Boom (bottom spar of the sail) -->
  <rect x="72" y="300" width="336" height="8" rx="3" fill="#4a3020" />
  <circle cx="72"  cy="304" r="7" fill="#4a3020" />
  <circle cx="408" cy="304" r="7" fill="#4a3020" />

  <!-- Stern cabin roof -->
  <rect x="125" y="355" width="75" height="9" rx="2" fill="#5a3a20" />
  <!-- Stern cabin body (sits on deck, left of centre since ship faces right) -->
  <rect x="132" y="364" width="62" height="52" rx="2" fill="url(#tf-cabin)" />
  <!-- Cabin window -->
  <rect x="152" y="378" width="22" height="12" rx="3" fill="#ffd9a6" opacity="0.85" />

  <!-- Deck plank (thin warm strip just above hull) -->
  <path
    d="M 118 416 L 394 416 L 404 424 L 108 424 Z"
    fill="#c89968" />

  <!-- Hull — stretched ellipse -->
  <ellipse cx="256" cy="434" rx="154" ry="33" fill="url(#tf-hull)" />

  <!-- Waterline trim (darker ring underlining the hull) -->
  <ellipse cx="256" cy="452" rx="152" ry="9" fill="#5c3820" opacity="0.85" />

  <!-- Bow detail (slight forward tip) -->
  <path d="M 408 434 Q 420 424 410 410 Q 404 420 408 434 Z" fill="#a07448" />

  <!-- Lantern hot cores (drawn on top of halos) -->
  <circle cx="355" cy="392" r="8" fill="#ffe8c0" />
  <circle cx="355" cy="392" r="4" fill="#ffffff" opacity="0.85" />
  <circle cx="223" cy="392" r="8" fill="#ffe8c0" />
  <circle cx="223" cy="392" r="4" fill="#ffffff" opacity="0.85" />
</svg>
